name: Parent Epic
description: Broad feature goal managed by orchestrator and decomposed by planner
labels: ["type:epic", "status:ready-for-planning"]
body:
  - type: input
    id: goal
    attributes:
      label: Goal
      description: What outcome should be achieved?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: In-scope / out-of-scope boundaries
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: Concrete conditions for considering this complete
    validations:
      required: true
  - type: textarea
    id: children
    attributes:
      label: Child issues checklist
      description: List child issues as they are created
      value: |
        - [ ] #<child-issue>
