name: Fix Task
description: Planner-opened corrective task linked to a PR
labels: ["type:fix", "status:ready-for-work", "role:worker"]
body:
  - type: input
    id: source_pr
    attributes:
      label: Source PR
      placeholder: "#<pr-id>"
    validations:
      required: true
  - type: input
    id: source_issue
    attributes:
      label: Source issue
      placeholder: "#<issue-id>"
    validations:
      required: true
  - type: textarea
    id: defect
    attributes:
      label: Defect / gap
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] Fix implemented
        - [ ] Validation added/updated
    validations:
      required: true
